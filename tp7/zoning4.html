<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zoning 4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; height: 100vh; display: flex; flex-direction: column; }

  .haut {
    background: #4dd0e1;
    padding: 4px 6px;
    border: 1px solid #00838f;
    height: 35px;
  }

  .menu {
    background: #ab47bc;
    padding: 4px 6px;
    border: 1px solid #6a1b9a;
    height: 30px;
  }

  .milieu {
    background: #ffca28;
    flex: 1;
    padding: 4px 6px;
    border: 1px solid #f57f17;
  }

  .bas {
    background: #bdbdbd;
    padding: 4px 6px;
    border: 1px solid #757575;
    height: 30px;
  }
</style>
</head>
<body>
  <div class="haut">Haut</div>
  <div class="menu">Menu</div>
  <div class="milieu">Milieu</div>
  <div class="bas">Bas</div>
</body>
</html>
