<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zoning 5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; height: 100vh; display: flex; flex-direction: column; }

  .haut {
    background: #4db6ac;
    padding: 4px 6px;
    border: 1px solid #00695c;
    height: 35px;
  }

  .menu {
    background: #26a69a;
    padding: 4px 6px;
    border: 1px solid #004d40;
    height: 28px;
  }

  .rangee-haut {
    display: flex;
    flex: 1;
  }

  .rangee-bas {
    display: flex;
    flex: 1;
  }

  .A {
    background: #80cbc4;
    flex: 1;
    padding: 4px 6px;
    border: 1px solid #00695c;
  }

  .B {
    background: #ffca28;
    flex: 1;
    padding: 4px 6px;
    border: 1px solid #f57f17;
  }

  .C {
    background: #ce93d8;
    flex: 1;
    padding: 4px 6px;
    border: 1px solid #6a1b9a;
  }

  .D {
    background: #5c6bc0;
    flex: 1;
    padding: 4px 6px;
    border: 1px solid #1a237e;
  }

  .bas {
    background: #ffee58;
    padding: 4px 6px;
    border: 1px solid #f9a825;
    height: 28px;
  }
</style>
</head>
<body>
  <div class="haut">Haut</div>
  <div class="menu">Menu</div>
  <div class="rangee-haut">
    <div class="A">A</div>
    <div class="B">B</div>
  </div>
  <div class="rangee-bas">
    <div class="C">C</div>
    <div class="D">D</div>
  </div>
  <div class="bas">Bas</div>
</body>
</html>
