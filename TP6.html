<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Memory</title>

<style>

html,body{
width:100%;
height:100%;
min-width:600px;
margin:0;
display:flex;
justify-content:center;
align-items:center;
}

/* grille */
.grille{
display:grid;
grid-template-columns:repeat(5,120px);
gap:15px;
}

/* cacher checkbox */
.carte input{
display:none;
}

.carte{
width:120px;
height:160px;
perspective:1000px;
cursor:pointer;
}

/* animation flip */
.contenu{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.6s;
}

/* quand on clique */
.carte input:checked + .contenu{
transform:rotateY(180deg);
}

/* faces */
.face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border:1px solid black;
display:flex;
justify-content:center;
align-items:center;
}

/* dos */
.dos{
background:blue;
}

/* image */
.face img{
width:100%;
height:100%;
object-fit:cover;
}

/* face avant */
.devant{
transform:rotateY(180deg);
}

</style>
</head>
